# configs/densenet_D1.yaml
#
# DenseNet-169 D1 — Baseline experiment.
#
# Primary metric : Val F1 (fracture class, pos_label=0)
# Architecture   : DenseNet-169 ImageNet pretrained, full fine-tune
# Optimizer      : Adam, flat LR (1e-4 backbone and head)
# Scheduler      : ReduceLROnPlateau
# Data           : FracAtlas binary split — same splits as ResNet-18 (seed=42)
#                  Fractured  → official train/valid/test.csv
#                  Non-frac   → proportional 80/12/8, seed=42
#
# Prerequisite — build the dataset once (shared with ResNet-18):
#   python data/prepare_classification.py
#
# Run:
#   python main.py --config configs/densenet_D1.yaml --task D1
#
# Decision gate:
#   If F1 < 55% → check overfitting, increase weight_decay.
#   If F1 ≥ 55% → proceed to D2 (configs/densenet_D2.yaml).
#
# Mirrors E3/E4a baseline setup for ResNet-18.
# No dropout (clean baseline). BCE weighted (weight_mult=0.5, proven best from E4a).
# 50 epochs to give DenseNet-169 sufficient convergence budget.
# Expected: F1 ≈ 62–68%, close to ResNet-18 range.

D1:
  experiment_id : "D1"
  task          : "classify_densenet"
  data_dir      : "data/dataset_cls"
  epochs        : 50
  batch_size    : 32
  img_size      : 224
  device        : "0"
  dropout_p     : 0.0
  weight_mult   : 0.5
  loss          : "weighted_ce"
  scheduler     : "plateau"
  lr_backbone   : 1.0e-4
  lr_head       : 1.0e-4
  val_threshold : 0.5
  plot          : true
